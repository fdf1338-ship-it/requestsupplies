<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Request Supplies</title>

    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="container">

        <h1>Request Supplies</h1>
        <h2>Create Account</h2>

        <form id="signupForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

    <script type="module" src="auth.js"></script>

</body>
</html>
