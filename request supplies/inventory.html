<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - Request Supplies</title>

    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="inventory.css">
</head>
<body>

<div class="app-layout">

    <div class="sidebar">

        <h2>Request Supplies</h2>

        <a href="dashboard.html">📊 Dashboard</a>
        <a href="requests.html">📦 Requests</a>
        <a href="inventory.html">📦 Inventory</a>
        <a href="employees.html">👥 Employees</a>
        <a href="schedule.html">📅 Schedule</a>
        <a href="reports.html">📈 Reports</a>
        <a href="notifications.html">🔔 Notifications</a>
        <a href="chat.html">💬 Chat</a>
        <a href="settings.html">⚙️ Settings</a>
        <a href="admin.html">🛠️ Admin Panel</a>
        <a href="profile.html">👤 Profile</a>

    </div>

    <div class="content">

        <h1>Inventory Management</h1>

        <form id="inventoryForm" class="inventory-form">

            <input
                type="text"
                id="itemName"
                placeholder="Item Name"
                required
            >

            <input
                type="number"
                id="itemQuantity"
                placeholder="Quantity"
                required
            >

            <input
                type="number"
                id="minimumQuantity"
                placeholder="Minimum Quantity"
                required
            >

            <input
                type="file"
                id="itemImage"
                accept="image/*"
            >

            <button type="submit">
                Add Inventory Item
            </button>

        </form>

        <div
            id="inventoryList"
            class="inventory-grid"
        ></div>

    </div>

</div>

<script src="sidebar.js"></script>
<script type="module" src="inventory.js"></script>
<script type="module" src="inventory-list.js"></script>

</body>
</html>
