    <div class="content">

        <h1>Supply Requests</h1>

        <form id="requestForm">

            <input
                type="text"
                id="item"
                placeholder="Item Needed"
                required
            >

            <input
                type="number"
                id="quantity"
                placeholder="Quantity"
                required
            >

            <select id="priority">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <textarea
    id="description"
    placeholder="Description"
></textarea>

<label for="requestImage">
    📷 Upload Picture
</label>

<input
    type="file"
    id="requestImage"
    accept="image/*"
>

<button type="submit">
    Submit Request
</button>

        </form>

        <div id="requestsList"></div>

    </div>
